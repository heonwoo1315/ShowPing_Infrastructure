# AWS Secrets Manager import 비활성화 (테스트 환경에서는 외부 연결 없이 실행)
spring:
  config:
    import: ""
  cloud:
    aws:
      credentials:
        access-key: test
        secret-key: test
      region:
        static: ap-northeast-2

jwt:
  secret: test-secret-key-for-junit-test-only-32chars
  access:
    expiration: 3600000
  refresh:
    expiration: 86400000
